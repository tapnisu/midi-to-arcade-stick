name: Test

on: push

env:
  CARGO_TERM_COLOR: always

jobs:
  check:
    strategy:
      fail-fast: false
      matrix:
        os: [
            # ubuntu-latest,
            windows-latest,
          ]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      - name: Install alsa
        if: matrix.os == 'ubuntu-latest'
        run: sudo apt-get update && sudo apt-get install libasound2-dev
      # Don't forget to update `Cargo.toml`
      - name: Setup rust 1.88.0
        run: rustup toolchain install 1.88.0 --profile minimal --no-self-update
      - name: Rust Cache
        uses: Swatinem/rust-cache@v2
      - name: Clippy
        run: cargo clippy --verbose
